<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Align-it</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-mark">◎</span>
        <span class="logo-text">Align-it</span>
      </div>

      <button class="new-project-btn" id="newProjectBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        새 프로젝트
      </button>

      <div class="sidebar-section-label">진행 중</div>
      <div class="sidebar-projects" id="sidebarProjects">
        <!-- populated by JS -->
      </div>

      <div class="sidebar-footer">
        <div class="progress-wrap" id="progressWrap" style="display:none">
          <div class="progress-meta">
            <span id="progressLabel">준비 중</span>
            <span id="progressFraction">0/5</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">

      <!-- Top bar -->
      <header class="topbar">
        <span class="topbar-title" id="topbarTitle">새 프로젝트</span>
        <div class="topbar-tabs" id="topbarTabs" style="display:none">
          <button class="tab active" data-tab="prd">PRD</button>
          <button class="tab" data-tab="feature">기능 명세</button>
          <button class="tab" data-tab="api">API 명세</button>
          <button class="tab" data-tab="erd">ERD</button>
          <button class="tab" data-tab="qa">QA</button>
        </div>
        <div class="topbar-status" id="topbarStatus"></div>
      </header>

      <!-- Message area -->
      <div class="messages" id="messages"></div>

      <!-- Tab result area (shown after pipeline) -->
      <div class="tab-content" id="tabContent" style="display:none"></div>

      <!-- Input bar -->
      <div class="input-area">
        <div class="input-bar">
          <label class="attach-btn" for="fileInput" title="PDF 첨부">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 7.5L8 13a4 4 0 01-5.657-5.657l6.364-6.364a2.5 2.5 0 013.536 3.536L6.1 10.657a1 1 0 01-1.414-1.414L10.828 3.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </label>
          <input type="file" id="fileInput" accept=".pdf" multiple style="display:none" />
          <textarea id="chatInput" placeholder="메시지를 입력하세요..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M13.5 7.5L1.5 1.5l2.5 6-2.5 6 12-6z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="attached-files" id="attachedFiles"></div>
      </div>

    </main>

    <!-- ── Right Panel ── -->
    <aside class="right-panel" id="rightPanel">
      <div class="panel-header">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4.5v3l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Agent
      </div>
      <div class="panel-body" id="panelBody">
        <div class="panel-empty">프로젝트를 생성하면<br/>여기에 요약이 표시됩니다.</div>
      </div>
      <div class="panel-commit" id="panelCommit" style="display:none">
        <textarea class="commit-summary" id="commitSummary" placeholder="Summary"></textarea>
        <textarea class="commit-desc" id="commitDesc" placeholder="Description"></textarea>
        <button class="commit-btn" id="commitBtn">Commit</button>
      </div>
    </aside>

  </div>

  <script src="app.js"></script>
</body>
</html>
